%YAML 1.2
---

common_params:
  # --- Stream selection ---
  # For infra (recommended — lighter on CPU, no debayering):
  enable_infra1: True
  enable_infra2: False
  enable_color: False
  # For RGB instead: set enable_infra1: False, enable_color: True

  enable_depth: False
  enable_rgbd: False
  enable_gyro: False
  enable_accel: False
  pointcloud.enable: False
  publish_tf: True
  enable_sync: True
  initial_reset: False

  # --- Stream profiles ---
  depth_module.infra_profile: '640,480,15'
  rgb_camera.profile: '640,480,15'

  depth_module.enable_auto_exposure: True
  depth_module.emitter_enabled: 0    # must be off for ChArUco detection on infra

cameras:
  - camera_name: camera2
    serial_no: '234222300435'    # D455
    depth_module.inter_cam_sync_mode: 0

  - camera_name: camera1
    serial_no: '243322074768'    # D435i
    depth_module.inter_cam_sync_mode: 0
